<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descrição YouTube — inftools</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#18181b;color:#fafafa;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
header{background:#27272a;border-bottom:1px solid #3f3f46;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.back{font-size:12px;color:#71717a;text-decoration:none;display:flex;align-items:center;gap:5px;transition:color .12s}
.back:hover{color:#fafafa}
.h-title{font-size:15px;font-weight:600}
.h-sub{font-size:12px;color:#71717a;margin-left:auto}

/* LAYOUT */
.app{display:flex;flex:1;overflow:hidden}
.pane{flex:1;overflow-y:auto;padding:20px}
.pane-l{border-right:1px solid #3f3f46}

/* LABELS / INPUTS */
.lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#71717a;margin-bottom:5px;display:block}
.inp{width:100%;background:#111114;border:1px solid #3f3f46;border-radius:6px;color:#fafafa;padding:7px 10px;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .12s}
.inp:focus{border-color:#7c3aed}
.section{margin-bottom:20px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#71717a}

/* TIMESTAMPS */
#ts-list{display:flex;flex-direction:column;gap:6px}
.ts-row{display:flex;gap:6px;align-items:center;animation:rowIn .15s ease}
@keyframes rowIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ts-time{width:80px;flex-shrink:0;font-variant-numeric:tabular-nums;letter-spacing:.02em}
.ts-name{flex:1}
.ts-rm{background:transparent;border:none;color:#71717a;cursor:pointer;font-size:16px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:5px;flex-shrink:0;transition:all .12s}
.ts-rm:hover{background:#3f3f46;color:#fafafa}
.ts-rm:disabled{opacity:.2;cursor:default}

/* BUTTONS */
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;transition:all .12s}
.btn-ghost{background:transparent;color:#a1a1aa;border:1px solid #3f3f46}.btn-ghost:hover{background:#3f3f46;color:#fafafa}
.btn-accent{background:#7c3aed;color:#fff}.btn-accent:hover{background:#6d28d9}
.btn-danger{background:transparent;color:#71717a;border:1px solid #3f3f46}.btn-danger:hover{background:#7f1d1d;color:#fca5a5;border-color:#7f1d1d}
.btn-add{width:100%;margin-top:4px;padding:8px;background:#1f1f23;border:1.5px dashed #3f3f46;border-radius:7px;color:#a1a1aa;font-size:12px;cursor:pointer;transition:all .12s;font-family:'Inter',sans-serif}
.btn-add:hover{border-color:#7c3aed;color:#fafafa}
.btn-copy{width:100%;padding:10px;font-size:13px}
.btn-copy.ok{background:#15803d}.btn-copy.ok:hover{background:#166534}

/* PREVIEW */
.preview-box{background:#111114;border:1px solid #3f3f46;border-radius:8px;padding:14px;min-height:180px;font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:13px;line-height:1.8;color:#d4d4d8;white-space:pre-wrap;word-break:break-all;flex:1}
.preview-wrap{display:flex;flex-direction:column;gap:10px;height:100%}
.char-bar{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#71717a}
.char-warn{color:#f59e0b}
.char-ok{color:#71717a}
.empty-hint{color:#3f3f46;font-style:italic}
.sep{height:1px;background:#3f3f46;margin:16px 0}

@media(max-width:700px){
  .app{flex-direction:column}
  .pane-l{border-right:none;border-bottom:1px solid #3f3f46}
}
</style>
</head>
<body>

<header>
  <a class="back" href="../../">← inftools</a>
  <span class="h-title">Descrição YouTube</span>
  <span class="h-sub">Capítulos e timestamps</span>
</header>

<div class="app">

  <!-- LEFT: editor -->
  <div class="pane pane-l">

    <div class="section">
      <label class="lbl" for="vid-title">Título do vídeo (referência)</label>
      <input class="inp" id="vid-title" type="text" placeholder="Ex: Como criar thumbnails no Canva" oninput="render()">
    </div>

    <div class="section">
      <div class="sec-hdr">
        <span class="sec-title">Capítulos</span>
        <span style="font-size:11px;color:#52525b">MM:SS ou HH:MM:SS</span>
      </div>
      <div id="ts-list"></div>
      <button class="btn-add" onclick="addRow()">＋ Capítulo</button>
    </div>

    <div class="sep"></div>
    <button class="btn btn-danger" style="width:100%" onclick="clearAll()">Limpar tudo</button>
  </div>

  <!-- RIGHT: preview -->
  <div class="pane">
    <div class="preview-wrap">
      <div class="sec-hdr">
        <span class="sec-title">Preview</span>
        <div class="char-bar">
          <span id="char-count" class="char-ok">0 / 5000</span>
        </div>
      </div>
      <div class="preview-box" id="preview"><span class="empty-hint">Adicione capítulos para ver o resultado...</span></div>
      <button class="btn btn-accent btn-copy" id="btn-copy" onclick="copyOutput()">📋 Copiar descrição</button>
    </div>
  </div>

</div>

<script>
'use strict';

let rows = [];
let uid = 0;

function addRow(time='', name='', locked=false) {
  const id = ++uid;
  rows.push({ id, time, name, locked });
  renderRows();
  if (!locked) {
    // focus name input of new row
    setTimeout(() => {
      const el = document.querySelector(`#row-name-${id}`);
      if (el) el.focus();
    }, 30);
  }
}

function removeRow(id) {
  rows = rows.filter(r => r.id !== id);
  renderRows();
  render();
}

function renderRows() {
  const list = document.getElementById('ts-list');
  list.innerHTML = rows.map(r => `
    <div class="ts-row" id="row-${r.id}">
      <input class="inp ts-time" id="row-time-${r.id}" type="text"
        value="${esc(r.time)}"
        placeholder="00:00"
        ${r.locked ? 'readonly style="opacity:.45;cursor:default"' : ''}
        oninput="rowChange(${r.id},'time',this.value)"
        onkeydown="rowTab(event,${r.id},'time')">
      <input class="inp ts-name" id="row-name-${r.id}" type="text"
        value="${esc(r.name)}"
        placeholder="Nome do capítulo"
        oninput="rowChange(${r.id},'name',this.value)"
        onkeydown="rowTab(event,${r.id},'name')">
      <button class="ts-rm" onclick="removeRow(${r.id})" ${rows.length <= 1 || r.locked ? 'disabled' : ''} title="Remover">×</button>
    </div>
  `).join('');
}

function rowChange(id, field, val) {
  const r = rows.find(r => r.id === id);
  if (r) { r[field] = val; render(); }
}

function rowTab(e, id, field) {
  if (e.key !== 'Tab') return;
  const idx = rows.findIndex(r => r.id === id);
  if (field === 'time') {
    e.preventDefault();
    document.getElementById(`row-name-${id}`)?.focus();
  } else if (field === 'name') {
    if (!e.shiftKey && idx === rows.length - 1) {
      e.preventDefault();
      addRow();
    }
  }
}

function normalizeTime(raw) {
  const s = raw.trim();
  // already HH:MM:SS or MM:SS with leading zeros
  if (/^\d{1,2}:\d{2}:\d{2}$/.test(s)) {
    const [h,m,sec] = s.split(':').map(Number);
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  if (/^\d{1,2}:\d{2}$/.test(s)) {
    const [m,sec] = s.split(':').map(Number);
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  return s; // return as-is if invalid
}

function buildOutput() {
  return rows
    .filter(r => r.name.trim())
    .map(r => `${normalizeTime(r.time) || '00:00'} ${r.name.trim()}`)
    .join('\n');
}

function render() {
  const out = buildOutput();
  const preview = document.getElementById('preview');
  const charCount = document.getElementById('char-count');
  const btn = document.getElementById('btn-copy');

  if (!out) {
    preview.innerHTML = '<span class="empty-hint">Adicione capítulos para ver o resultado...</span>';
    charCount.textContent = '0 / 5000';
    charCount.className = 'char-ok';
    return;
  }

  preview.textContent = out;
  const len = out.length;
  charCount.textContent = `${len} / 5000`;
  charCount.className = len > 4800 ? 'char-warn' : 'char-ok';
}

function copyOutput() {
  const out = buildOutput();
  if (!out) return;
  navigator.clipboard.writeText(out).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✓ Copiado!';
    btn.classList.add('ok');
    setTimeout(() => {
      btn.textContent = '📋 Copiar descrição';
      btn.classList.remove('ok');
    }, 2000);
  });
}

function clearAll() {
  if (rows.length > 1 || rows[0]?.name) {
    if (!confirm('Limpar tudo?')) return;
  }
  rows = [];
  uid = 0;
  addRow('00:00', '', true);
  render();
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

// Init
addRow('00:00', '', true);
</script>
</body>
</html>
