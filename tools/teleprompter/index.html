<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teleprompter — inftools</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#18181b;color:#fafafa;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}

/* ── SETUP SCREEN ── */
#setup{display:flex;flex-direction:column;min-height:100vh}
header{background:#27272a;border-bottom:1px solid #3f3f46;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.back{font-size:12px;color:#71717a;text-decoration:none;display:flex;align-items:center;gap:5px;transition:color .12s}
.back:hover{color:#fafafa}
.h-title{font-size:15px;font-weight:600}

.setup-body{flex:1;max-width:760px;margin:0 auto;width:100%;padding:28px 24px;display:flex;flex-direction:column;gap:20px}

.lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#71717a;margin-bottom:6px;display:block}
textarea{width:100%;background:#111114;border:1px solid #3f3f46;border-radius:8px;color:#fafafa;padding:14px;font-size:15px;font-family:'Inter',sans-serif;outline:none;resize:vertical;min-height:260px;line-height:1.7;transition:border-color .12s}
textarea:focus{border-color:#7c3aed}
textarea::placeholder{color:#3f3f46}

.controls-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.ctrl-group{display:flex;flex-direction:column;gap:6px}
.ctrl-row{display:flex;align-items:center;gap:8px}
.ctrl-row input[type=range]{flex:1;accent-color:#7c3aed;cursor:pointer}
.ctrl-val{font-size:13px;color:#a1a1aa;width:36px;text-align:right;flex-shrink:0}
.toggle-row{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.tgl{position:relative;width:34px;height:20px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tslider{position:absolute;inset:0;background:#3f3f46;border-radius:20px;cursor:pointer;transition:.2s}
.tslider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.tgl input:checked+.tslider{background:#7c3aed}
.tgl input:checked+.tslider::before{transform:translateX(14px)}
.tgl-lbl{font-size:13px;color:#d4d4d8}

.btn-start{width:100%;padding:14px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:background .12s}
.btn-start:hover{background:#6d28d9}

.shortcuts{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:#52525b}
.shortcuts kbd{background:#27272a;border:1px solid #3f3f46;border-radius:4px;padding:2px 6px;font-size:10px;font-family:monospace;color:#a1a1aa}

/* ── READING SCREEN ── */
#reading{display:none;position:fixed;inset:0;background:#000;overflow:hidden;cursor:none}
#reading.active{display:block}

#scroll-track{position:absolute;inset:0;overflow:hidden}
#scroll-content{position:absolute;top:0;left:50%;transform:translateX(-50%);width:80vw;max-width:900px;padding:60vh 0 60vh;text-align:center;line-height:1.7;color:#fff;will-change:transform}
#scroll-content.mirrored{transform:translateX(-50%) scaleX(-1)}

/* progress bar */
#progress{position:fixed;bottom:0;left:0;height:3px;background:#7c3aed;width:0%;transition:width .1s linear;z-index:10}

/* controls overlay */
#controls{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:24px 32px 28px;display:flex;align-items:center;justify-content:center;gap:16px;z-index:20;transition:opacity .3s}
#controls.hidden{opacity:0;pointer-events:none}
.c-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;transition:all .12s;backdrop-filter:blur(8px)}
.c-btn:hover{background:rgba(255,255,255,.22)}
.c-btn.big{font-size:18px;width:44px;height:44px;padding:0;display:flex;align-items:center;justify-content:center}
.speed-group{display:flex;align-items:center;gap:6px}
.speed-lbl{font-size:13px;color:rgba(255,255,255,.6)}

/* end overlay */
#end-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:30}
#end-overlay.show{display:flex}
#end-overlay p{color:#fff;font-size:22px;font-weight:600}
#end-overlay button{background:#7c3aed;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer}
#end-overlay button:hover{background:#6d28d9}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <header>
    <a class="back" href="../../">← inftools</a>
    <span class="h-title">Teleprompter</span>
  </header>

  <div class="setup-body">

    <div>
      <label class="lbl" for="script">Roteiro</label>
      <textarea id="script" placeholder="Cole seu roteiro aqui…&#10;&#10;O texto vai rolar de baixo para cima enquanto você lê."></textarea>
    </div>

    <div class="controls-row">

      <div class="ctrl-group">
        <label class="lbl">Tamanho da fonte</label>
        <div class="ctrl-row">
          <input type="range" id="font-size" min="20" max="96" value="48" oninput="updateFontLabel()">
          <span class="ctrl-val" id="font-lbl">48px</span>
        </div>
      </div>

      <div class="ctrl-group">
        <label class="lbl">Velocidade</label>
        <div class="ctrl-row">
          <input type="range" id="speed" min="1" max="10" value="3" oninput="updateSpeedLabel()">
          <span class="ctrl-val" id="speed-lbl">3</span>
        </div>
      </div>

      <div class="ctrl-group">
        <label class="lbl">Opções</label>
        <label class="toggle-row">
          <div class="tgl"><input type="checkbox" id="mirror"><span class="tslider"></span></div>
          <span class="tgl-lbl">Espelhar texto</span>
        </label>
      </div>

    </div>

    <button class="btn-start" onclick="startReading()">▶ Iniciar</button>

    <div class="shortcuts">
      <span><kbd>Espaço</kbd> pausar/retomar</span>
      <span><kbd>←</kbd> <kbd>→</kbd> velocidade</span>
      <span><kbd>Esc</kbd> voltar ao início</span>
    </div>

  </div>
</div>

<!-- READING -->
<div id="reading">
  <div id="scroll-track">
    <div id="scroll-content"></div>
  </div>
  <div id="progress"></div>

  <div id="controls">
    <div class="speed-group">
      <button class="c-btn" onclick="changeSpeed(-1)">−</button>
      <span class="speed-lbl" id="speed-display">3</span>
      <button class="c-btn" onclick="changeSpeed(1)">＋</button>
    </div>
    <button class="c-btn big" id="play-btn" onclick="togglePause()">⏸</button>
    <button class="c-btn" onclick="restartReading()">↺ Reiniciar</button>
    <button class="c-btn" onclick="exitReading()">✕ Sair</button>
  </div>

  <div id="end-overlay">
    <p>Fim do roteiro</p>
    <button onclick="restartReading()">↺ Recomeçar</button>
    <button onclick="exitReading()" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15)">← Voltar ao início</button>
  </div>
</div>

<script>
'use strict';

let rafId = null;
let paused = false;
let scrollY = 0;
let speed = 3;
let hideTimer = null;
let totalHeight = 0;
let contentHeight = 0;

function updateFontLabel() {
  document.getElementById('font-lbl').textContent = document.getElementById('font-size').value + 'px';
}
function updateSpeedLabel() {
  document.getElementById('speed-lbl').textContent = document.getElementById('speed').value;
}

function px2speed(s) { return 0.25 + (s - 1) * 0.28; } // 1→0.25, 10→2.77 px/frame

function startReading() {
  const text = document.getElementById('script').value.trim();
  if (!text) { document.getElementById('script').focus(); return; }

  speed = parseInt(document.getElementById('speed').value);
  const fontSize = parseInt(document.getElementById('font-size').value);
  const mirrored = document.getElementById('mirror').checked;

  const content = document.getElementById('scroll-content');
  content.style.fontSize = fontSize + 'px';
  content.textContent = text;
  content.classList.toggle('mirrored', mirrored);

  scrollY = 0;
  paused = false;
  content.style.transform = `translateX(-50%) translateY(0)` + (mirrored ? ' scaleX(-1)' : '');

  document.getElementById('reading').classList.add('active');
  document.getElementById('play-btn').textContent = '⏸';
  document.getElementById('end-overlay').classList.remove('show');
  document.getElementById('speed-display').textContent = speed;

  // calculate total scrollable distance
  requestAnimationFrame(() => {
    const track = document.getElementById('scroll-track');
    contentHeight = content.scrollHeight;
    totalHeight = contentHeight - track.clientHeight;
    tick();
  });

  document.addEventListener('keydown', onKey);
  setupMouseHide();
}

function tick() {
  if (paused) return;
  const mirrored = document.getElementById('mirror').checked;
  scrollY += px2speed(speed);
  if (scrollY >= totalHeight) {
    scrollY = totalHeight;
    updateTransform(mirrored);
    updateProgress();
    document.getElementById('end-overlay').classList.add('show');
    return;
  }
  updateTransform(mirrored);
  updateProgress();
  rafId = requestAnimationFrame(tick);
}

function updateTransform(mirrored) {
  const c = document.getElementById('scroll-content');
  c.style.transform = `translateX(-50%) translateY(${-scrollY}px)` + (mirrored ? ' scaleX(-1)' : '');
}

function updateProgress() {
  const pct = totalHeight > 0 ? (scrollY / totalHeight) * 100 : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function togglePause() {
  paused = !paused;
  document.getElementById('play-btn').textContent = paused ? '▶' : '⏸';
  if (!paused) tick();
}

function changeSpeed(delta) {
  speed = Math.max(1, Math.min(10, speed + delta));
  document.getElementById('speed-display').textContent = speed;
  document.getElementById('speed').value = speed;
}

function restartReading() {
  scrollY = 0;
  paused = false;
  document.getElementById('play-btn').textContent = '⏸';
  document.getElementById('end-overlay').classList.remove('show');
  cancelAnimationFrame(rafId);
  tick();
}

function exitReading() {
  cancelAnimationFrame(rafId);
  document.getElementById('reading').classList.remove('active');
  document.getElementById('end-overlay').classList.remove('show');
  document.removeEventListener('keydown', onKey);
  clearTimeout(hideTimer);
  document.getElementById('controls').classList.remove('hidden');
  document.getElementById('reading').style.cursor = 'default';
}

function onKey(e) {
  if (e.key === ' ') { e.preventDefault(); togglePause(); showControls(); }
  if (e.key === 'ArrowRight') { changeSpeed(1); showControls(); }
  if (e.key === 'ArrowLeft') { changeSpeed(-1); showControls(); }
  if (e.key === 'Escape') exitReading();
}

function showControls() {
  const ctrl = document.getElementById('controls');
  ctrl.classList.remove('hidden');
  document.getElementById('reading').style.cursor = 'default';
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => {
    ctrl.classList.add('hidden');
    document.getElementById('reading').style.cursor = 'none';
  }, 3000);
}

function setupMouseHide() {
  const reading = document.getElementById('reading');
  reading.addEventListener('mousemove', showControls);
  showControls();
}
</script>
</body>
</html>
