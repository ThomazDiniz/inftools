<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário de Conteúdo — inftools</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#18181b;color:#fafafa;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
header{background:#27272a;border-bottom:1px solid #3f3f46;padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.back{font-size:12px;color:#71717a;text-decoration:none;transition:color .12s}
.back:hover{color:#fafafa}
.h-sep{width:1px;height:20px;background:#3f3f46}
.nav-row{display:flex;align-items:center;gap:8px}
.nav-btn{background:transparent;border:1px solid #3f3f46;color:#a1a1aa;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.nav-btn:hover{background:#3f3f46;color:#fafafa}
.month-label{font-size:15px;font-weight:600;min-width:140px;text-align:center}
.legend{display:flex;gap:10px;align-items:center;margin-left:auto;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#71717a;white-space:nowrap}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* CALENDAR */
.cal-wrap{flex:1;overflow:auto;padding:16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#3f3f46;border-radius:10px;overflow:hidden;min-width:700px}
.day-hdr{background:#27272a;padding:8px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#71717a;text-align:center}
.day-cell{background:#18181b;padding:8px;min-height:110px;cursor:pointer;transition:background .1s;position:relative;display:flex;flex-direction:column;gap:4px}
.day-cell:hover{background:#1f1f23}
.day-cell.today{outline:2px solid #7c3aed;outline-offset:-2px;z-index:1}
.day-cell.other-month{background:#111114}
.day-cell.other-month .day-num{color:#3f3f46}
.day-num{font-size:11px;font-weight:600;color:#71717a;margin-bottom:2px}
.day-cell.today .day-num{color:#a78bfa;font-weight:700}

/* chips */
.chip{font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500;transition:filter .1s}
.chip:hover{filter:brightness(1.2)}
.more-chip{font-size:10px;padding:2px 6px;color:#71717a;cursor:pointer}
.add-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:#3f3f46;opacity:0;transition:opacity .12s;pointer-events:none}
.day-cell:hover .add-hint{opacity:1}

/* STATUS COLORS */
:root{
  --ideia:#3f3f46;
  --gravando:#92400e;
  --editando:#1e3a8a;
  --agendado:#4c1d95;
  --publicado:#14532d;
}
.chip[data-s=ideia]{background:#3f3f46;color:#d4d4d8}
.chip[data-s=gravando]{background:#92400e;color:#fef3c7}
.chip[data-s=editando]{background:#1e3a8a;color:#bfdbfe}
.chip[data-s=agendado]{background:#4c1d95;color:#ddd6fe}
.chip[data-s=publicado]{background:#14532d;color:#bbf7d0}

.leg-dot[data-s=ideia]{background:#71717a}
.leg-dot[data-s=gravando]{background:#d97706}
.leg-dot[data-s=editando]{background:#3b82f6}
.leg-dot[data-s=agendado]{background:#8b5cf6}
.leg-dot[data-s=publicado]{background:#22c55e}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;z-index:100;padding:0}
.overlay.open{display:flex;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#27272a;border:1px solid #3f3f46;border-radius:14px 14px 0 0;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;padding:20px}
@media(min-height:600px){
  .overlay{align-items:center}
  .modal{border-radius:14px;max-height:80vh}
}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:600}
.modal-close{background:transparent;border:none;color:#71717a;cursor:pointer;font-size:18px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .12s}
.modal-close:hover{background:#3f3f46;color:#fafafa}

.entry-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.entry-item{background:#1f1f23;border:1px solid #3f3f46;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.entry-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.entry-dot[data-s=ideia]{background:#71717a}
.entry-dot[data-s=gravando]{background:#d97706}
.entry-dot[data-s=editando]{background:#3b82f6}
.entry-dot[data-s=agendado]{background:#8b5cf6}
.entry-dot[data-s=publicado]{background:#22c55e}
.entry-info{flex:1;min-width:0}
.entry-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-status{font-size:10px;color:#71717a;text-transform:capitalize;margin-top:1px}
.entry-notes{font-size:11px;color:#52525b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:transparent;border:none;color:#71717a;cursor:pointer;width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .12s}
.icon-btn:hover{background:#3f3f46;color:#fafafa}
.icon-btn.del:hover{background:#7f1d1d;color:#fca5a5}

/* add/edit form */
.entry-form{background:#1f1f23;border:1px solid #3f3f46;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:10px}
.lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#71717a;margin-bottom:4px;display:block}
.inp{width:100%;background:#111114;border:1px solid #3f3f46;border-radius:6px;color:#fafafa;padding:7px 10px;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .12s}
.inp:focus{border-color:#7c3aed}
select.inp{appearance:none;cursor:pointer}
.form-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;transition:all .12s}
.btn-ghost{background:transparent;color:#a1a1aa;border:1px solid #3f3f46}.btn-ghost:hover{background:#3f3f46;color:#fafafa}
.btn-accent{background:#7c3aed;color:#fff}.btn-accent:hover{background:#6d28d9}
.btn-add-entry{width:100%;padding:8px;background:transparent;border:1.5px dashed #3f3f46;border-radius:7px;color:#a1a1aa;font-size:12px;cursor:pointer;transition:all .12s;font-family:'Inter',sans-serif;margin-top:4px}
.btn-add-entry:hover{border-color:#7c3aed;color:#fafafa}

.empty-day{text-align:center;padding:16px;color:#52525b;font-size:12px}
</style>
</head>
<body>

<header>
  <a class="back" href="../../">← inftools</a>
  <div class="h-sep"></div>
  <div class="nav-row">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="month-label"></div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" data-s="ideia"></div>Ideia</div>
    <div class="leg-item"><div class="leg-dot" data-s="gravando"></div>Gravando</div>
    <div class="leg-item"><div class="leg-dot" data-s="editando"></div>Editando</div>
    <div class="leg-item"><div class="leg-dot" data-s="agendado"></div>Agendado</div>
    <div class="leg-item"><div class="leg-dot" data-s="publicado"></div>Publicado</div>
  </div>
</header>

<div class="cal-wrap">
  <div class="cal-grid" id="cal-grid"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
'use strict';

const STORAGE_KEY = 'inftools_calendar';
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS_PT   = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
const STATUSES  = ['ideia','gravando','editando','agendado','publicado'];
const STATUS_LABELS = { ideia:'Ideia', gravando:'Gravando', editando:'Editando', agendado:'Agendado', publicado:'Publicado' };

let curYear, curMonth, entries, modalDate, editingId;

function load() {
  try { entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { entries = []; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function init() {
  const now = new Date();
  curYear = now.getFullYear();
  curMonth = now.getMonth();
  load();
  renderCalendar();
}

function changeMonth(delta) {
  curMonth += delta;
  if (curMonth < 0) { curMonth = 11; curYear--; }
  if (curMonth > 11) { curMonth = 0; curYear++; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('month-label').textContent = `${MONTHS_PT[curMonth]} ${curYear}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // header
  DAYS_PT.forEach(d => {
    const hdr = document.createElement('div');
    hdr.className = 'day-hdr';
    hdr.textContent = d;
    grid.appendChild(hdr);
  });

  const today = new Date();
  const firstDay = new Date(curYear, curMonth, 1);
  // Monday-based: getDay() 0=Sun → 6, 1=Mon → 0, ...
  let startDow = (firstDay.getDay() + 6) % 7;
  const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
  const prevMonthDays = new Date(curYear, curMonth, 0).getDate();

  const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell';

    let dayNum, dateStr, isOther = false;

    if (i < startDow) {
      dayNum = prevMonthDays - startDow + i + 1;
      const d = curMonth === 0 ? curYear - 1 : curYear;
      const m = curMonth === 0 ? 11 : curMonth - 1;
      dateStr = toDateStr(d, m, dayNum);
      isOther = true;
    } else if (i >= startDow + daysInMonth) {
      dayNum = i - startDow - daysInMonth + 1;
      const d = curMonth === 11 ? curYear + 1 : curYear;
      const m = curMonth === 11 ? 0 : curMonth + 1;
      dateStr = toDateStr(d, m, dayNum);
      isOther = true;
    } else {
      dayNum = i - startDow + 1;
      dateStr = toDateStr(curYear, curMonth, dayNum);
    }

    if (isOther) cell.classList.add('other-month');

    const isToday = (today.getFullYear() === parseInt(dateStr.slice(0,4)) &&
                     today.getMonth()    === parseInt(dateStr.slice(5,7))-1 &&
                     today.getDate()     === parseInt(dateStr.slice(8,10)));
    if (isToday) cell.classList.add('today');

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = dayNum;
    cell.appendChild(numEl);

    const dayEntries = entries.filter(e => e.date === dateStr);
    const show = dayEntries.slice(0, 3);
    show.forEach(e => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.dataset.s = e.status;
      chip.textContent = e.title || '(sem título)';
      chip.onclick = ev => { ev.stopPropagation(); openModal(dateStr, e.id); };
      cell.appendChild(chip);
    });
    if (dayEntries.length > 3) {
      const more = document.createElement('div');
      more.className = 'more-chip';
      more.textContent = `+${dayEntries.length - 3} mais`;
      more.onclick = ev => { ev.stopPropagation(); openModal(dateStr); };
      cell.appendChild(more);
    }

    const hint = document.createElement('div');
    hint.className = 'add-hint';
    hint.textContent = '+';
    cell.appendChild(hint);

    cell.onclick = () => openModal(dateStr);
    grid.appendChild(cell);
  }
}

function toDateStr(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function openModal(dateStr, highlightId) {
  modalDate = dateStr;
  editingId = null;
  const [y,m,d] = dateStr.split('-').map(Number);
  document.getElementById('modal-title').textContent = `${d} de ${MONTHS_PT[m-1]} ${y}`;
  renderModalBody();
  document.getElementById('overlay').classList.add('open');
  document.addEventListener('keydown', modalKey);

  if (highlightId) {
    // start editing that entry
    setTimeout(() => startEdit(highlightId), 50);
  }
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.removeEventListener('keydown', modalKey);
  editingId = null;
  renderCalendar();
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function modalKey(e) {
  if (e.key === 'Escape') closeModal();
}

function renderModalBody() {
  const dayEntries = entries.filter(e => e.date === modalDate);
  const body = document.getElementById('modal-body');

  let html = '';

  if (dayEntries.length === 0) {
    html += `<div class="empty-day">Nenhum vídeo planejado para este dia.</div>`;
  } else {
    html += `<div class="entry-list" id="entry-list">`;
    dayEntries.forEach(e => {
      if (e.id === editingId) {
        html += buildForm(e);
      } else {
        html += `<div class="entry-item" id="entry-${e.id}">
          <div class="entry-dot" data-s="${e.status}"></div>
          <div class="entry-info">
            <div class="entry-title">${escHtml(e.title||'(sem título)')}</div>
            <div class="entry-status">${STATUS_LABELS[e.status]}</div>
            ${e.notes ? `<div class="entry-notes">${escHtml(e.notes)}</div>` : ''}
          </div>
          <div class="entry-actions">
            <button class="icon-btn" onclick="startEdit('${e.id}')" title="Editar">✏</button>
            <button class="icon-btn del" onclick="deleteEntry('${e.id}')" title="Excluir">×</button>
          </div>
        </div>`;
      }
    });
    html += `</div>`;
  }

  if (editingId === 'new') {
    html += buildForm(null);
  } else {
    html += `<button class="btn-add-entry" onclick="startNew()">＋ Adicionar vídeo</button>`;
  }

  body.innerHTML = html;
}

function buildForm(entry) {
  const id = entry ? entry.id : 'new';
  const title = entry ? escAttr(entry.title) : '';
  const notes = entry ? escAttr(entry.notes||'') : '';
  const statusOpts = STATUSES.map(s =>
    `<option value="${s}" ${entry && entry.status===s?'selected':''}>${STATUS_LABELS[s]}</option>`
  ).join('');

  return `<div class="entry-form" id="form-${id}">
    <div>
      <label class="lbl">Título</label>
      <input class="inp" id="f-title-${id}" type="text" value="${title}" placeholder="Título do vídeo" autofocus>
    </div>
    <div>
      <label class="lbl">Status</label>
      <select class="inp" id="f-status-${id}">${statusOpts}</select>
    </div>
    <div>
      <label class="lbl">Notas (opcional)</label>
      <input class="inp" id="f-notes-${id}" type="text" value="${notes}" placeholder="Pauta, ideia rápida...">
    </div>
    <div class="form-btns">
      <button class="btn btn-ghost" onclick="cancelForm()">Cancelar</button>
      <button class="btn btn-accent" onclick="saveEntry('${id}')">Salvar</button>
    </div>
  </div>`;
}

function startNew() {
  editingId = 'new';
  renderModalBody();
  setTimeout(() => document.getElementById('f-title-new')?.focus(), 30);
}

function startEdit(id) {
  editingId = id;
  renderModalBody();
  setTimeout(() => document.getElementById(`f-title-${id}`)?.focus(), 30);
}

function cancelForm() {
  editingId = null;
  renderModalBody();
}

function saveEntry(formId) {
  const titleEl  = document.getElementById(`f-title-${formId}`);
  const statusEl = document.getElementById(`f-status-${formId}`);
  const notesEl  = document.getElementById(`f-notes-${formId}`);
  const title  = titleEl?.value.trim() || '';
  const status = statusEl?.value || 'ideia';
  const notes  = notesEl?.value.trim() || '';

  if (formId === 'new') {
    entries.push({ id: uid(), date: modalDate, title, status, notes });
  } else {
    const idx = entries.findIndex(e => e.id === formId);
    if (idx >= 0) entries[idx] = { ...entries[idx], title, status, notes };
  }
  save();
  editingId = null;
  renderModalBody();
}

function deleteEntry(id) {
  if (!confirm('Excluir este vídeo do calendário?')) return;
  entries = entries.filter(e => e.id !== id);
  save();
  editingId = null;
  renderModalBody();
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
