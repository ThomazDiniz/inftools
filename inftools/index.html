<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>inftools</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #09090b;
    color: #fafafa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 32px;
  }
  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: #52525b;
    text-transform: uppercase;
  }
  h1 {
    font-size: clamp(32px, 6vw, 64px);
    font-weight: 700;
    letter-spacing: -0.03em;
    text-align: center;
    line-height: 1.1;
  }
  h1 span { color: #a855f7; }
  .subtitle {
    font-size: 15px;
    color: #71717a;
    text-align: center;
    max-width: 420px;
    line-height: 1.6;
  }
  .tools {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
  }
  .tool-card {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 16px;
    padding: 24px;
    width: 220px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, transform 0.15s;
    cursor: pointer;
  }
  .tool-card:hover {
    border-color: #a855f7;
    transform: translateY(-2px);
  }
  .tool-card .ic {
    font-size: 28px;
    line-height: 1;
  }
  .tool-card .name {
    font-size: 15px;
    font-weight: 600;
  }
  .tool-card .desc {
    font-size: 12px;
    color: #71717a;
    line-height: 1.5;
  }
  .tool-card .tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    background: #27272a;
    color: #a1a1aa;
    padding: 2px 8px;
    border-radius: 99px;
    margin-top: auto;
  }
  footer {
    font-size: 11px;
    color: #3f3f46;
  }
</style>
</head>
<body>

<div class="logo">inftools</div>

<div style="text-align:center">
  <h1>Tools para<br><span>influencers</span></h1>
</div>

<div class="tools">
  <a class="tool-card" href="thumbnail_maker.html">
    <div class="ic">🖼️</div>
    <div class="name">Thumbnail Maker</div>
    <div class="desc">Crie thumbnails para YouTube e outras redes em múltiplos formatos.</div>
    <div class="tag">Visual</div>
  </a>
</div>

<footer>inftools · feito para creators</footer>

</body>
</html>
